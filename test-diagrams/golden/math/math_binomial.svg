<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="27px" preserveAspectRatio="none" style="width:424px;height:27px;background:#FFFFFF;" version="1.1" viewBox="0 0 424 27" width="424px" zoomAndPan="magnify"><?plantuml 1.2026.3beta6?><defs/><g><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="413.0068" x="5" y="17.9951">(x+y)^n&#160;=&#160;\sum_{k=0}^{n}&#160;\binom{n}{k}&#160;x^k&#160;y^{n-k}</text></g></svg>