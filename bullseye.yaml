    context: |-
      Brand-name rebrand (PlantUML → RustUML) shipped 2026-05-23 in commit d769d504. The URL portion was deliberately left as plantuml.com because the substring appears both in PlantUML's own welcome-screen text ("https://plantuml.com" as a standalone text element) AND in user-supplied link markup ([[https://plantuml.com]] in a user puml). A brute substring replace caught the user case as well, breaking 9 creole link goldens.

      Resolution requires either:
      - A context-aware substitution that recognises welcome-screen URL emission specifically (e.g. by detecting the surrounding "Welcome to RustUML!" phrase in the same <g> wrapper), OR
