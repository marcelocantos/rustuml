  T5:
    name: Tier-1 quick-win strict-XML fixes are landed in master
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'Activity if/else **branch placement and width formula** match PlantUML: `node_width(If) = (diamond_w + 20) + (then_w + else_w)/2`; branches positioned at `cx ± (diamond_w + 20)/2` regardless of branch box width; no artificial 60-px branch minimum. (Note: closing the `cond_*` failure cluster also requires cx-asymmetry handling for unequal branch widths and an if-branch arrow-length constant; captured in follow-up [[bullseye/T5.1]]. Structural width is in place.) — commit `2bdb6eb1`.'
    - Activity parser regex for arrow brackets (`-[#red]->`) no longer reports `dashed=true`; renderer workaround for `parser_dashed` is now redundant (kept as documentation). — commit `4303df2f`.
    - 'State title rendering wraps in `<g class="title" data-source-line="1">` with `font-weight="700"` (numeric form). Verified structurally byte-identical across all 7 title goldens. (Note: full pass requires other state-renderer coordinate fixes outside T5 scope.) — commit `24e26458`.'
    - State `hide empty description` / `show empty description` is captured by the parser (as `hideEmptyDescription` skinparam) and consumed by the renderer (40-px bare `<rect>` + `<text>`, no entity wrapper, no divider). End-to-end path wired. — commits `24e26458` + `3bbd5377`.
    - 'State `<<start>>` / `<<end>>` stereotypes are recognised and emit `start_entity` / `end_entity` groups with the matching pseudostate glyphs. (Fork/join exclusion from the ID counter was investigated and rejected: PlantUML allocates the counter slot for fork/join even without emitting an entity group, and excluding them breaks downstream `data-entity-N` references in `<g class="link">` wrappers — the original hypothesis was wrong.) — commit `24e26458`.'
    - Class source-line numbering does not drift after blank lines. Root cause was in the preprocessor (blank lines were dropped, so subsequent content showed as one line too early); fixed by pushing blank lines through as empty strings. +5 strict-XML passes (5 `class_hier_d1_i*`, 1 multi-diagram bonus). — commit `459d69f4`.
    - Deployment parser tokenises `-down->`, `-up->`, `-left->`, `-right->` directional arrows (and their dotted/dashed variants). +4 strict-XML passes. — commit `7a9bd174`.
    - Activity `Title.emit_node` cursor-convention refactor is deferred to follow-up [[bullseye/T5.2]] — the Start ellipse's three-case branch is correct as-is and the refactor doesn't move the pass count on its own; better tackled when the title/warnings/start geometry rework is paired with a measurable test cluster.
    - Activity `if/else` full byte-exact cond_* pass-through is deferred to follow-up [[bullseye/T5.1]] — the structural width formula (acceptance item 1) is in place, but the cx-asymmetry shift `(then_w - else_w)/4` and the if-branch arrow-length constant are separate fixes that need their own design pass.
    context: |-
      Curated cluster of small, well-scoped strict-XML fixes pulled from the 2026-05-18 agent fan-out reports. **Revised on 2026-05-20 after execution** to reflect what actually shipped and what was discovered to be out-of-scope:

      - Items 1, 3, 4, 5, 6, 7 (in the revised list) landed cleanly across commits `2bdb6eb1`, `4303df2f`, `24e26458`, `3bbd5377`, `459d69f4`, `7a9bd174`.
      - Item 2 (state creole-aware emission), originally listed, was **already complete on master** before T5 was created (commit `9d68ac7d` from earlier work). Removed from the acceptance list to avoid confusion.
      - Item 7's "fork/join exclusion from ID counter" sub-hypothesis was **rejected after investigation** — PlantUML allocates the counter slot for fork/join even without emitting an entity group, and excluding them breaks downstream `data-entity-N` references. The state agent's investigation is the canonical answer; the original brief was wrong.
      - Items 1 and 2 (activity if/else full pass, Title cursor refactor) turned out to be **larger than \"easy\"**. The structural width fix landed; full byte-exact pass closure needs additional work captured in [[bullseye/T5.1]]. The Title cursor refactor is captured in [[bullseye/T5.2]].

      Net measurable impact on the strict-XML golden suite: +9 passes (2,109 → 2,118 across the bullseye-measured baseline; +5 class, +4 deployment). The other commits are structural precursors with no immediate byte-exact pass-count effect but unblock downstream geometry work. The two follow-up targets capture the genuinely harder pieces so they don't get conflated with quick wins again.

      Sources: agent reports from worktree-agent-* branches on 2026-05-18 and 2026-05-20, direct investigation on master 2026-05-19/20.
    origin: manual
    discovered: 2026-05-19
    achieved: 2026-05-20
  T5.1:
    name: Activity if/else cond_* tests pass byte-exact
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - All `act_cond_*` activity goldens pass strict-XML comparison.
    - 'Activity diagram cx accounts for if/else branch-width asymmetry: when `then_w != else_w`, the diagram''s cx shifts by `(then_w - else_w)/4` from the geometric centre so branches are equidistant from cx (matches PlantUML''s branch-symmetric centring).'
    - If-branch arrow length uses 10 px (PlantUML's actual gap from diamond bottom to branch action top), not the generic `ARROW_LEN=20` used elsewhere. Likely introduces an `IF_BRANCH_ARROW_LEN` constant or computes the gap in `emit_if` directly.
    context: |-
