name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rustuml-${{ github.event.release.tag_name }}-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rustuml-${{ github.event.release.tag_name }}-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: rustuml-${{ github.event.release.tag_name }}-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NO_V="${VERSION#v}"
          ARTIFACT="rustuml-${VERSION_NO_V}-$(echo ${{ matrix.artifact }} | sed "s/rustuml-${VERSION}-//")"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rustuml dist/
          cd dist
          tar czf "../${ARTIFACT}.tar.gz" rustuml

      - name: Upload to release
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NO_V="${VERSION#v}"
          ARTIFACT="rustuml-${VERSION_NO_V}-$(echo ${{ matrix.artifact }} | sed "s/rustuml-${VERSION}-//")"
          gh release upload "$VERSION" "${ARTIFACT}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: 'bin.install "rustuml" => "rustuml"'
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          test: 'system bin/"rustuml", "--version"'
          skip_checksum: true
          update_readme_table: true
