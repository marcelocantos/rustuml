  T5.1.1:
    name: Activity diagrams with single-character branch actions render with the correct svg width
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Branch-distance formula updated to `max(diamond_w + 20, (then_w + else_w)/2 + 20)` so branches don't crowd each other when wider than the diamond. Closes the `act_condition_labels_empty_labels` failure (originally listed in T5.1.1 acceptance) and a further +18 strict-XML passes across the activity bucket. — commit `748ca7b9`.
    - Investigation completed for the 5 remaining `act_cond_style_diamonds_*` failures. The root cause is **not** a min-branch-width or single-character heuristic as originally hypothesised; it is a 1-px svg-width adder in PlantUML that fires when content_w's fractional part lands ~0.95 (e.g., 102.95 → svg should be 139, ceil gives 138). Every cheap-fix tested (+0.5 content_w, +0.05 MARGIN_TRAIL, +0.25 per extent, +1 when narrow) introduces 60–150 regressions in unrelated tests. Captured as a separate target [[bullseye/T5.1.2]] for follow-up requiring deeper PlantUML source inspection.
    context: |-
      **Revised on 2026-05-20 after execution.** Original framing assumed all 6 remaining `act_cond_*` failures shared a common single-character-branch root cause. Investigation revealed the framing was wrong:

      1. `act_condition_labels_empty_labels` was actually a **branch-crowding** bug independent of branch-character-count: the branch_dist formula `diamond_w + 20` under-spaced branches when the branch text was wider than the diamond. Fixed by switching to `max(diamond_w + 20, (then_w + else_w)/2 + 20)`. Closed cleanly with +19 total bucket gain and zero regressions.

      2. The 5 remaining `act_cond_style_diamonds_*` tests are a **different** bug — a 1-px svg-width discrepancy that appears when `content_w + 35` lands at e.g. `137.95` (ceil = 138) but golden expects 139. Every isolated formula tweak that closes those 5 introduces 60-150 regressions across activity/creole/preprocessing/skinparam because the 1-px adder is bound to specific PlantUML internal state we can't observe externally. The fix needs deeper investigation against PlantUML's `Dimension` rounding logic in its Java source.

      Cumulative T5.1.1 impact: +19 strict-XML passes (2,187 → 2,206); 34/39 `act_cond_*` pass (was 33/39). The 5 remaining diamonds tests are split off as [[bullseye/T5.1.2]].
