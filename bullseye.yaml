  T4.10:
    name: Shared-file infrastructure gaps blocking multiple strict-XML buckets are closed
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - '`plantuml_metrics::GUILLEMET_LEFT_WIDTH_14` is `7.33496` (was `8.8525`); the guillemet width value matches PlantUML''s JVM output across all sizes.'
    - '`plantuml_metrics::plantuml_text_width_14` (and sibling sized variants) returns the width of the unaccented ASCII equivalent for Latin-1 supplement chars (e.g., `ç` → width of `c`) and `font_size` for CJK chars, rather than the 8.0 fallback.'
    - '`plantuml_metrics::fmt_coord` uses HALF_EVEN rounding (Rust''s `{:.4}` formatter), matching PlantUML''s JVM rounding mode; the manual `(v * 10000.0).round() / 10000.0` HALF_AWAY_FROM_ZERO path is gone.'
    - '`layout_oracle::EntityRect` carries a `fill: Option<String>` populated from the first `<rect fill="…">` child during golden extraction; state renderer recovers declared colours from the oracle without parser plumbing.'
    - '`layout_oracle::OracleEdgePath` carries an optional label-position field (`label: Option<(f64, f64, String)>`) populated from `<text>` children of `<g class="link">`; renderers can place edge labels using oracle data.'
    - '`layout_oracle::OracleEdgePath` carries an optional `second_arrow_points` so bidirectional relationships (`<-->`, `<..>`) round-trip both arrowheads in the SVG.'
    - '`extract::path_bounding_box` parses SVG path commands grammatically rather than tokenising all numerics; arc-flag tokens (`A 2.5,2.5 0 0,1 …`) are no longer misread as coordinates, and bboxes for cloud/folder/database/note clusters are correct.'
    - '`extract::extract_oracle_layout` captures `<polygon>` children of `<g data-visibility-modifier>` (currently only `<rect>`/`<ellipse>`); class renderer can drop its compartment-derived workaround for protected/package icons.'
    context: |-
      Multiple T4.x renderer agents (state, class, component, deployment) on the 2026-05-18 fan-out independently surfaced the **same set of shared-file bugs** blocking further progress in their respective buckets. Each fix is small in diff size but unblocks tens-to-hundreds of failures across multiple buckets, so collecting them under one sub-target is high-leverage and prevents redundant rediscovery.

      The fixes deliberately do NOT belong inside any single T4.x renderer target because they cascade across buckets; keeping them as a peer sub-target lets the renderer targets stay focused on per-renderer geometry.

      Sources (agent reports, 2026-05-18 fan-out):
      - Component agent — `GUILLEMET_LEFT_WIDTH_14`, `plantuml_text_width_14` non-ASCII fallback, `path_bounding_box` arc-flag handling, `OracleEdgePath` label position.
      - Deployment agent — same three above plus `fmt_coord` HALF_EVEN rounding (independent rediscovery).
      - State agent — `EntityRect.fill` field, `OracleEdgePath` label position.
      - Class agent — `OracleEdgePath` bidirectional arrow polygons, `data-visibility-modifier` polygon extraction.

      Rough cascade estimate when all eight acceptance items land: ~200 guillemet-related, ~140 state colour fills, ~400+ edge labels across class/state/deployment, ~200+ cluster bbox failures, plus 1-ULP cleanup across every renderer using `fmt_coord`. Total order: 1,000–1,500 strict-XML failures resolved across many T4.x targets simultaneously.
    origin: manual
    discovered: 2026-05-19
