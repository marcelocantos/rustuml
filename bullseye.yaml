  T5:
    name: Tier-1 quick-win strict-XML fixes are landed in master
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - Activity `if/else` layout width matches PlantUML (formula changes from `then_w + else_w + label_w + else_label_w + 20.0` to `then_w + else_w + (cond_w - 5)` family); ~62 `cond_*` activity failures resolved.
    - Activity `Title.emit_node` returns the cursor at the next-node centreline; warnings band and `Start` ellipse share one coordinate convention; the three-case `Start` branch collapses to one.
    - Activity parser regex for arrow brackets (`-[#red]->`) no longer reports `dashed=true` when only colour/style brackets are present.
    - State title rendering wraps in `<g class="title" data-source-line="1">` with `font-weight="700"` (was bare `<text>` with `"bold"`); 7 state failures resolved.
    - State `hide empty description` skinparam path emits bare `<rect>` + `<text>` with no entity wrapper, no divider, and height=40; 6 state failures resolved.
    - State renderer wires `text_render::emit_text` for state names and descriptions (creole-aware emission for `<b>`, italics, monospace); ~12 state failures resolved.
    - State recognises `<<start>>` / `<<end>>` stereotypes and excludes fork/join bars from the entity-id counter (no entity group in PlantUML for those).
    - Class source-line numbering does not drift after blank lines; 4 `class_hier_d1_i*` failures resolved.
    - Deployment parser tokenises `-down->`, `-up->`, `-left->`, `-right->` directional arrows.
    context: |-
      Curated list of small, well-scoped strict-XML fixes pulled from the 2026-05-18 agent fan-out reports across the activity, class, state, component, and deployment renderers. Each item is ≤1 session of work in a single file (or a one-line parser change) with a known acceptance signal — explicitly the "low-hanging fruit" subset of the larger T4.x work.

      Bundled into a single peer target (not a sub-target of T4) so the cluster can be picked off as one piece of work without diluting per-bucket T4.x targets, and so the cumulative pass-count delta is visible at a glance. Closing T5 knocks roughly 150–200 strict-XML failures (~1.5% of remaining ≈9,000), but more importantly is a quick momentum boost that demonstrates the per-bucket fix patterns to whoever picks up the harder T4.x work next.

      Explicitly **out of scope** for T5 (kept under their respective T4.x renderer targets):
      - Composite/concurrent states (T4.4)
      - `while`/`repeat` loop layout (T4.1)
      - Container-kind parsing (cloud/folder/node/database/queue) (T4.5, T4.8)
      - Note rendering with dog-ear paths (cross-bucket)
      - Class separator-style preservation (T4.2)
      - Component inline-colour parsing (T4.5)
      - All shared-file infrastructure gaps (T4.10)

      Sources: agent reports from worktree-agent-* branches on 2026-05-18. See also [[bullseye/T4.10]] for the higher-leverage shared-file unblocks that should land first or in parallel.
    origin: manual
    discovered: 2026-05-19
