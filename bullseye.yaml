  T2:
    name: Ditaa rendering engine ported to Rust
    status: set_aside
    value: 5.0
    cost: 10.0
    set_aside_reason: Parked pending perceptual image-diff comparator. Ditaa is one of many strict-XML gaps under 🎯T4 (~100 of 9,630 strict-XML diffs as of 2026-05-17, not "the only remaining parity gap" as the previous wording claimed). The Java→Rust port is mechanical, but the test path needs perceptual diff because Java Graphics2D and tiny-skia don't produce pixel-identical raster output. The strict-XML comparator skips @startditaa entries by design (golden_pairs.rs:163). Revisit when there is appetite for the perceptual-diff infrastructure.
