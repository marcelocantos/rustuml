<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="27px" preserveAspectRatio="none" style="width:1039px;height:27px;background:#FFFFFF;" version="1.1" viewBox="0 0 1039 27" width="1039px" zoomAndPan="magnify"><?plantuml 1.2026.3beta6?><defs/><g><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="1028.3027" x="5" y="17.9951">\nabla&#160;\cdot&#160;\vec{F}&#160;=&#160;\frac{\partial&#160;F_x}{\partial&#160;x}&#160;+&#160;\frac{\partial&#160;F_y}{\partial&#160;y}&#160;+&#160;\frac{\partial&#160;F_z}{\partial&#160;z}</text></g></svg>