<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="27px" preserveAspectRatio="none" style="width:348px;height:27px;background:#FFFFFF;" version="1.1" viewBox="0 0 348 27" width="348px" zoomAndPan="magnify"><?plantuml 1.2026.3beta6?><defs/><g><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="337.1484" x="5" y="17.9951">e^x&#160;=&#160;\sum_{n=0}^{\infty}&#160;\frac{x^n}{n!}</text></g></svg>