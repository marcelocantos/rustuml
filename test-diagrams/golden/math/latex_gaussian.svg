<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="27px" preserveAspectRatio="none" style="width:575px;height:27px;background:#FFFFFF;" version="1.1" viewBox="0 0 575 27" width="575px" zoomAndPan="magnify"><?plantuml 1.2026.3beta6?><defs/><g><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="564.7236" x="5" y="17.9951">f(x)&#160;=&#160;\frac{1}{\sigma\sqrt{2\pi}}&#160;e^{-\frac{(x-\mu)^2}{2\sigma^2}}</text></g></svg>