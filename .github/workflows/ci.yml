name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  PLANTUML_VERSION: "1.2025.2"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  test-oracle:
    name: Oracle Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Cache PlantUML JAR
        id: cache-plantuml
        uses: actions/cache@v4
        with:
          path: /tmp/plantuml.jar
          key: plantuml-${{ env.PLANTUML_VERSION }}

      - name: Download PlantUML JAR
        if: steps.cache-plantuml.outputs.cache-hit != 'true'
        run: |
          curl -L -o /tmp/plantuml.jar \
            "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar"

      - name: Start PlantUML server
        run: |
          java -jar /tmp/plantuml.jar -picoweb:8787 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8787/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run oracle tests
        env:
          PLANTUML_URL: http://127.0.0.1:8787
          PLANTUML_JAR: /tmp/plantuml.jar
        run: cargo test --test oracle

      - name: Run proptest oracle tests
        env:
          PLANTUML_URL: http://127.0.0.1:8787
        run: cargo test --test proptest_oracle

      - name: Run matrix oracle tests
        env:
          PLANTUML_URL: http://127.0.0.1:8787
        run: cargo test --test matrix_oracle
