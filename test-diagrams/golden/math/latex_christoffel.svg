<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="27px" preserveAspectRatio="none" style="width:1283px;height:27px;background:#FFFFFF;" version="1.1" viewBox="0 0 1283 27" width="1283px" zoomAndPan="magnify"><?plantuml 1.2026.3beta6?><defs/><g><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="1272.7354" x="5" y="17.9951">\Gamma^\lambda_{\mu\nu}&#160;=&#160;\frac{1}{2}g^{\lambda\sigma}\left(\partial_\mu&#160;g_{\nu\sigma}&#160;+&#160;\partial_\nu&#160;g_{\mu\sigma}&#160;-&#160;\partial_\sigma&#160;g_{\mu\nu}\right)</text></g></svg>